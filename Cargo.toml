[workspace]
members = ["crates/core"]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.75"

[workspace.dependencies]
chrono = { version = "^0.4", default-features = false, features = ["clock", "serde", "std"] }
serde = { version = "^1.0", features = ["derive"] }
serde_json = "^1.0"
tempfile = "=3.10.0"
thiserror = "^1.0"
