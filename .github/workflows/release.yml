name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates to crates.io"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Package core crate
        run: cargo package --locked -p outpost-core

      - name: Package CLI crate
        run: cargo package --locked -p git-outpost --config 'patch.crates-io.outpost-core.path="crates/core"'

  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check published versions
        id: published
        shell: bash
        run: |
          core_version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "outpost-core") | .version')"
          cli_version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "git-outpost") | .version')"

          echo "core_version=${core_version}" >> "${GITHUB_OUTPUT}"
          echo "cli_version=${cli_version}" >> "${GITHUB_OUTPUT}"

          if curl -fsS "https://crates.io/api/v1/crates/outpost-core/${core_version}" > /dev/null; then
            echo "core=true" >> "${GITHUB_OUTPUT}"
          else
            echo "core=false" >> "${GITHUB_OUTPUT}"
          fi

          if curl -fsS "https://crates.io/api/v1/crates/git-outpost/${cli_version}" > /dev/null; then
            echo "cli=true" >> "${GITHUB_OUTPUT}"
          else
            echo "cli=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Authenticate to crates.io
        if: steps.published.outputs.core != 'true' || steps.published.outputs.cli != 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish core crate
        if: steps.published.outputs.core != 'true'
        run: cargo publish --locked -p outpost-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for core crate index update
        if: steps.published.outputs.core != 'true' && steps.published.outputs.cli != 'true'
        run: sleep 30

      - name: Publish CLI crate
        if: steps.published.outputs.cli != 'true'
        run: cargo publish --locked -p git-outpost
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
