name: Publish Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"
  MDBOOK_MERMAID_VERSION: "0.17.0"

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install mdBook
        run: |
          cargo install mdbook --version "$MDBOOK_VERSION" --locked
          cargo install mdbook-mermaid --version "$MDBOOK_MERMAID_VERSION" --locked

      - name: Build docs
        run: mdbook build docs

      - name: Verify deployable Mermaid assets
        run: |
          if grep -R 'src="\.assets/' docs/book/*.html; then
            echo "Generated docs reference hidden .assets paths that GitHub Pages upload excludes" >&2
            exit 1
          fi
          mermaid_assets="$(grep -Roh 'src="assets/mermaid[^"]*"' docs/book/*.html || true)"
          if [ -z "$mermaid_assets" ]; then
            echo "Generated docs do not reference deployable Mermaid assets" >&2
            exit 1
          fi
          missing=0
          for src in $(printf '%s\n' "$mermaid_assets" | sed 's/src="//;s/"//'); do
            if [ ! -f "docs/book/$src" ]; then
              echo "Generated docs reference missing Mermaid asset: $src" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book

  deploy:
    name: Deploy docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
